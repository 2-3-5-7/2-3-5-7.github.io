<li><p>How to Read a Book</p>
 <figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br></pre></td><td class="code"><pre><span class="line">How to Read a Book</span><br><span class="line">Mortimer J. Adler, Charles Van Doren</span><br><span class="line">5 stars</span><br><span class="line"></span><br><span class="line">Why read this book? To learn how to read. The purpose of reading is divided into three types: entertainment, obtaining information, and increasing knowledge. The method here serves the last one. The books used to increase knowledge are those books that are above your abilities. This kind of books will definitely be laborious to read and perplex you. The author believes that in addition to staying awake and devoted to reading, some reading skills are needed.</span><br><span class="line"></span><br><span class="line">There are four levels of reading. Higher levels include lower ones. The four levels are: to understand the sentences in the book, to quickly get the topic and structure of the book, to analyze and judge a book in detail, and to read books with different perspectives on the same topic.</span><br><span class="line"></span><br><span class="line">A book is equivalent to a teacher who cannot answer questions, so readers have to ask questions and answer them by themselves. This book describes what kind of questions should be asked at different levels.</span><br></pre></td></tr></table></figure></li>

</ol>
